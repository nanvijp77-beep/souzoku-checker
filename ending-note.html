<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エンディングノート｜大切な情報を残しておこう</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
      background: #FFFBF5;
      color: #374151;
      min-height: 100vh;
      padding: 20px 16px 60px;
    }

    .container { max-width: 560px; margin: 0 auto; }

    /* ヘッダー */
    .header {
      text-align: center;
      padding: 28px 0 24px;
    }
    .header .icon { font-size: 52px; display: block; margin-bottom: 14px; }
    .header h1 { font-size: 22px; font-weight: 800; color: #1F2937; margin-bottom: 10px; line-height: 1.4; }
    .header p { font-size: 14px; color: #6B7280; line-height: 1.7; }

    .back-link {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px; font-weight: 600;
      color: #F59E0B;
      text-decoration: none;
      border: 2px solid #F59E0B;
      border-radius: 10px;
      padding: 6px 16px;
      transition: background 0.15s;
    }
    .back-link:hover { background: #FFFBF0; }

    /* お知らせ */
    .notice {
      background: #FFFBF0;
      border-left: 4px solid #F59E0B;
      border-radius: 0 12px 12px 0;
      padding: 12px 16px;
      font-size: 13px;
      color: #6B7280;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    /* セクションカード */
    .section-card {
      background: white;
      border-radius: 20px;
      padding: 24px 22px 20px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #F9FAFB;
    }
    .section-icon { font-size: 24px; }
    .section-title { font-size: 17px; font-weight: 800; color: #1F2937; }

    /* フィールド行 */
    .field-row {
      display: grid;
      grid-template-columns: 110px 1fr 28px;
      gap: 8px;
      align-items: start;
      margin-bottom: 10px;
    }
    .field-label {
      font-size: 13px; font-weight: 600; color: #4B5563;
      padding-top: 9px; line-height: 1.4;
    }
    .field-input {
      font-family: inherit; font-size: 14px; color: #1F2937;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      padding: 8px 10px; width: 100%;
      resize: vertical; min-height: 38px;
      background: #F9FAFB;
      transition: border-color 0.18s, background 0.18s;
    }
    .field-input:focus { outline: none; border-color: #F59E0B; background: #fff; }

    .extra-label-input {
      font-family: inherit; font-size: 13px; font-weight: 600; color: #4B5563;
      border: 1.5px solid #E5E7EB; border-radius: 10px;
      padding: 8px 10px; width: 100%;
      background: #F9FAFB;
      transition: border-color 0.18s;
    }
    .extra-label-input:focus { outline: none; border-color: #F59E0B; background: #fff; }

    .btn-delete {
      background: none; border: none;
      color: #D1D5DB; font-size: 18px; line-height: 1;
      cursor: pointer; padding: 6px 2px; border-radius: 6px;
      transition: color 0.15s;
    }
    .btn-delete:hover { color: #EF4444; }

    .field-spacer { width: 28px; }

    /* ＋追加ボタン */
    .btn-add {
      display: flex; align-items: center; gap: 6px;
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: #F59E0B;
      background: #FFFBF0;
      border: 1.5px dashed #FCD34D;
      border-radius: 10px;
      padding: 9px 16px; cursor: pointer;
      width: 100%; margin-top: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-add:hover { background: #FEF3C7; border-color: #F59E0B; }

    /* 保存エリア */
    .actions {
      background: white;
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      margin-bottom: 16px;
    }
    .btn-pdf {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit; font-size: 16px; font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #F59E0B, #EF6C00);
      border: none; border-radius: 14px;
      padding: 16px; cursor: pointer; width: 100%;
      box-shadow: 0 4px 14px rgba(245,158,11,0.38);
      transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
      margin-bottom: 10px;
    }
    .btn-pdf:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(245,158,11,0.48); }
    .btn-pdf:active { transform: translateY(0); }

    .save-status { text-align: center; font-size: 12px; color: #9CA3AF; }
    .save-status.saved { color: #059669; }

    /* フッター */
    .footer {
      text-align: center;
      font-size: 11px; color: #D1D5DB;
      line-height: 1.7; margin-top: 8px;
    }

    /* スマホ対応 */
    @media (max-width: 440px) {
      .field-row { grid-template-columns: 88px 1fr 24px; }
      .field-label { font-size: 12px; }
    }

    /* 印刷用レイアウト：画面では非表示、印刷時のみ表示 */
    #pdfSource { display: none; }

    @media print {
      body { background: white; padding: 0; margin: 0; }
      .container { display: none !important; }
      #pdfSource {
        display: block !important;
        width: 100%;
        padding: 0;
        font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
        color: #1F2937;
      }
    }

    /* 印刷内容のスタイル（スマホでも見やすいよう大きめ） */
    #pdfSource .pdf-title { font-size: 34px; font-weight: 800; margin-bottom: 6px; }
    #pdfSource .pdf-date { font-size: 18px; color: #6B7280; margin-bottom: 28px; }
    #pdfSource .pdf-section { margin-bottom: 28px; page-break-inside: avoid; }
    #pdfSource .pdf-section-title {
      font-size: 26px; font-weight: 800; color: #B45309;
      border-bottom: 3px solid #F59E0B;
      padding-bottom: 8px; margin-bottom: 16px;
    }
    #pdfSource .pdf-field { margin-bottom: 16px; }
    #pdfSource .pdf-field-label { font-size: 19px; font-weight: 700; color: #4B5563; margin-bottom: 5px; }
    #pdfSource .pdf-field-value {
      font-size: 21px; color: #1F2937; line-height: 1.7;
      white-space: pre-wrap;
      border-bottom: 1px solid #E5E7EB;
      min-height: 26px; padding-bottom: 6px;
    }
    #pdfSource .pdf-empty { color: #C7CDD6; }

    /* ボタンのローディング状態 */
    .btn-pdf:disabled { opacity: 0.6; cursor: wait; }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <span class="icon">📝</span>
    <h1>エンディングノート</h1>
    <p>大切な情報を残しておこう。<br>途中でやめてもOK・少しずつ書けばいい。</p>
    <a href="index.html" class="back-link no-print">← 相続チェッカーに戻る</a>
  </div>

  <div class="notice no-print">
    💡 入力内容はこのブラウザにだけ保存されます。サーバーには何も送信されません。<br>
    「印刷・PDFで保存する」を押すと印刷プレビューが開きます。<br>
    プレビュー画面で印刷先を「<b>PDFに保存</b>」に選ぶと、PDFとして保存できます。
  </div>

  <!-- 👤 基本情報 -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-icon">👤</span>
      <span class="section-title">基本情報</span>
    </div>
    <div class="fields" id="fields-basic"></div>
    <button class="btn-add no-print" onclick="addField('basic')">＋ 項目を追加する</button>
  </div>

  <!-- 👨‍👩‍👧 家族 -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-icon">👨‍👩‍👧</span>
      <span class="section-title">家族</span>
    </div>
    <div class="fields" id="fields-family"></div>
    <button class="btn-add no-print" onclick="addField('family')">＋ 項目を追加する</button>
  </div>

  <!-- 💰 財産 -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-icon">💰</span>
      <span class="section-title">財産</span>
    </div>
    <div class="fields" id="fields-assets"></div>
    <button class="btn-add no-print" onclick="addField('assets')">＋ 項目を追加する</button>
  </div>

  <!-- 🏥 医療 -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-icon">🏥</span>
      <span class="section-title">医療</span>
    </div>
    <div class="fields" id="fields-medical"></div>
    <button class="btn-add no-print" onclick="addField('medical')">＋ 項目を追加する</button>
  </div>

  <!-- 💻 デジタル -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-icon">💻</span>
      <span class="section-title">デジタル</span>
    </div>
    <div class="fields" id="fields-digital"></div>
    <button class="btn-add no-print" onclick="addField('digital')">＋ 項目を追加する</button>
  </div>

  <!-- 保存 -->
  <div class="actions no-print">
    <button class="btn-pdf" onclick="savePDF()">🖨️ 印刷・PDFで保存する</button>
    <div class="save-status" id="saveStatus">準備中...</div>
  </div>

  <div class="footer">
    入力内容はこのブラウザにのみ保存されます。他には送信されません。
  </div>

</div>

<!-- PDF生成用（画面には表示されない） -->
<div id="pdfSource"></div>

<script>
const SECTIONS = {
  basic: [
    { id: 'basic-name',      label: '氏名',       placeholder: '例：山田 花子' },
    { id: 'basic-birth',     label: '生年月日',   placeholder: '例：1971年4月1日' },
    { id: 'basic-address',   label: '住所',       placeholder: '現住所を記入' },
    { id: 'basic-blood',     label: '血液型',     placeholder: '例：A型' },
    { id: 'basic-emergency', label: '緊急連絡先', placeholder: '氏名・続柄・電話番号' }
  ],
  family: [
    { id: 'family-members', label: '家族構成',        placeholder: '例：長男〇〇（45歳）など' },
    { id: 'family-contact', label: '連絡してほしい人', placeholder: '名前・続柄・連絡先' },
    { id: 'family-pet',     label: 'ペット情報',      placeholder: '種類・名前・預け先など' }
  ],
  assets: [
    { id: 'assets-bank',       label: '銀行',         placeholder: '銀行名・通帳と印鑑の保管場所' },
    { id: 'assets-securities', label: '証券会社',     placeholder: '会社名・口座番号・残高確認方法' },
    { id: 'assets-insurance',  label: '保険',         placeholder: '保険会社・種類・証書の場所' },
    { id: 'assets-property',   label: '不動産',       placeholder: '所在地・権利証の場所' },
    { id: 'assets-valuables',  label: '貴重品の場所', placeholder: '現金・貴金属・重要書類など' }
  ],
  medical: [
    { id: 'medical-doctor',      label: 'かかりつけ医',   placeholder: '病院名・診療科・電話番号' },
    { id: 'medical-illness',     label: '持病',           placeholder: '病名・服薬中の薬' },
    { id: 'medical-allergy',     label: 'アレルギー',     placeholder: '食物・薬・その他' },
    { id: 'medical-lifesupport', label: '延命治療の希望', placeholder: '希望する／しない、など自由に' }
  ],
  digital: [
    { id: 'digital-smartphone',   label: 'スマホ暗証番号',    placeholder: '機種・暗証番号・保管メモの場所' },
    { id: 'digital-pc',           label: 'PCパスワード',      placeholder: 'メーカー・ログインパスワード' },
    { id: 'digital-gmail',        label: 'Gmail',            placeholder: 'メールアドレス・パスワード' },
    { id: 'digital-line',         label: 'LINE',             placeholder: 'アカウント・引き継ぎコード取得方法' },
    { id: 'digital-paypay',       label: 'PayPay',           placeholder: '登録電話番号・暗証番号' },
    { id: 'digital-securities',   label: '証券会社ログイン', placeholder: '会社名・ログインID・パスワード' },
    { id: 'digital-subscription', label: '定期・サブスク',   placeholder: 'サービス名・金額・解約方法' }
  ]
};

const SECTION_TITLES = {
  basic:   '👤 基本情報',
  family:  '👨‍👩‍👧 家族',
  assets:  '💰 財産',
  medical: '🏥 医療',
  digital: '💻 デジタル'
};

const STORAGE_KEY = 'ending-note-v1';
let saveTimer = null;

function init() {
  const saved = loadData();
  Object.entries(SECTIONS).forEach(([sid, fields]) => {
    const container = document.getElementById('fields-' + sid);
    fields.forEach(f => container.appendChild(makeDefaultRow(f, saved.defaults?.[f.id] || '')));
    (saved.extra?.[sid] || []).forEach(item => container.appendChild(makeExtraRow(sid, item.label, item.value)));
  });
  setStatus('loaded');
}

function makeDefaultRow(f, savedValue) {
  const row = document.createElement('div');
  row.className = 'field-row';

  const lbl = document.createElement('div');
  lbl.className = 'field-label';
  lbl.textContent = f.label;

  const ta = document.createElement('textarea');
  ta.className = 'field-input';
  ta.placeholder = f.placeholder;
  ta.rows = 2;
  ta.dataset.fid = f.id;
  ta.value = savedValue;
  ta.addEventListener('input', schedule);

  const sp = document.createElement('div');
  sp.className = 'field-spacer';

  row.append(lbl, ta, sp);
  return row;
}

function makeExtraRow(sid, labelVal, valueVal) {
  const row = document.createElement('div');
  row.className = 'field-row extra-row';
  row.dataset.sid = sid;

  const li = document.createElement('input');
  li.type = 'text';
  li.className = 'extra-label-input';
  li.placeholder = '項目名';
  li.value = labelVal || '';
  li.addEventListener('input', schedule);

  const ta = document.createElement('textarea');
  ta.className = 'field-input';
  ta.placeholder = '内容を記入';
  ta.rows = 2;
  ta.value = valueVal || '';
  ta.addEventListener('input', schedule);

  const del = document.createElement('button');
  del.className = 'btn-delete no-print';
  del.textContent = '×';
  del.title = '削除';
  del.addEventListener('click', () => { row.remove(); schedule(); });

  row.append(li, ta, del);
  return row;
}

function addField(sid) {
  const container = document.getElementById('fields-' + sid);
  const row = makeExtraRow(sid, '', '');
  container.appendChild(row);
  row.querySelector('input').focus();
  schedule();
}

function schedule() {
  clearTimeout(saveTimer);
  setStatus('saving');
  saveTimer = setTimeout(saveData, 800);
}

function saveData() {
  const data = { defaults: {}, extra: {} };
  document.querySelectorAll('[data-fid]').forEach(el => { data.defaults[el.dataset.fid] = el.value; });
  Object.keys(SECTIONS).forEach(sid => {
    data.extra[sid] = Array.from(document.querySelectorAll(`#fields-${sid} .extra-row`))
      .map(r => ({ label: r.querySelector('input')?.value || '', value: r.querySelector('textarea')?.value || '' }));
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  setStatus('saved');
}

function loadData() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function setStatus(state) {
  const el = document.getElementById('saveStatus');
  if (state === 'saving') { el.textContent = '保存中...'; el.className = 'save-status'; }
  else if (state === 'saved') { el.textContent = '✅ 自動保存されました'; el.className = 'save-status saved'; }
  else { el.textContent = '前回の入力を読み込みました'; el.className = 'save-status saved'; }
}

/* ---------- 印刷・PDF保存（印刷プレビュー方式・LINEブラウザ対応） ---------- */
function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildPrintSource() {
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 作成`;

  let html = `<div class="pdf-title">📝 エンディングノート</div>`;
  html += `<div class="pdf-date">${dateStr}</div>`;

  Object.keys(SECTIONS).forEach(sid => {
    const rows = [];

    // 標準項目
    SECTIONS[sid].forEach(f => {
      const el = document.querySelector(`[data-fid="${f.id}"]`);
      rows.push({ label: f.label, value: el ? el.value : '' });
    });
    // 追加項目
    document.querySelectorAll(`#fields-${sid} .extra-row`).forEach(r => {
      rows.push({
        label: r.querySelector('input')?.value || '（項目名なし）',
        value: r.querySelector('textarea')?.value || ''
      });
    });

    let fieldsHtml = '';
    rows.forEach(row => {
      const val = row.value && row.value.trim()
        ? `<div class="pdf-field-value">${escapeHtml(row.value)}</div>`
        : `<div class="pdf-field-value pdf-empty">（未記入）</div>`;
      fieldsHtml += `<div class="pdf-field"><div class="pdf-field-label">${escapeHtml(row.label)}</div>${val}</div>`;
    });

    html += `<div class="pdf-section">
      <div class="pdf-section-title">${SECTION_TITLES[sid]}</div>
      ${fieldsHtml}
    </div>`;
  });

  const src = document.getElementById('pdfSource');
  src.innerHTML = html;
  return src;
}

function savePDF() {
  saveData();
  buildPrintSource();
  // 印刷プレビューを開く（プレビューから「PDFで保存」を選べる）
  window.print();
}

init();
</script>
</body>
</html>
